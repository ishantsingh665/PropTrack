services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: proptrack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/proptrack
      - JWT_SECRET=025b5ee326cc7b0e160eacd22ae97368c081122248dbb73019b7a86e7e545aa5
      - JWT_EXPIRES_IN=7d
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_USER=proptrack_admin
      - MINIO_PASSWORD=proptrack_password
      - MINIO_BUCKET=proptrack
      - FILE_SIZE_LIMIT_MB=25
      - NOMINATIM_URL=http://nominatim:8080
      - GEOCODE_MAX_ATTEMPTS=3
      - GEOCODE_RETRY_INTERVAL_SECONDS=60
      - PORT=3000
      - NODE_ENV=development
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      - postgres
      - minio

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: proptrack_admin
      MINIO_ROOT_PASSWORD: proptrack_password
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  nominatim:
    image: mediagis/nominatim:4.2
    ports:
      - "8080:8080"
    environment:
      - NOMINATIM_PASSWORD=proptrack_password
    volumes:
      - nominatim_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  minio_data:
  nominatim_data:
