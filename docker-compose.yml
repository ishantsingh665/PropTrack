services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    mem_limit: 150m
    memswap_limit: 300m
    environment:
      - DATABASE_URL=postgresql://betahobby_admin:Fasting-Geography-Dating8-Bridged@postgres:5432/proptrack
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - MINIO_ENDPOINT=http://localhost:9000
      - MINIO_USER=placeholder
      - MINIO_PASSWORD=placeholder
      - MINIO_BUCKET=proptrack
      - FILE_SIZE_LIMIT_MB=25
      - NOMINATIM_URL=https://nominatim.openstreetmap.org
      - GEOCODE_MAX_ATTEMPTS=3
      - GEOCODE_RETRY_INTERVAL_SECONDS=60
      - PORT=3000
      - NODE_ENV=production
      - FRONTEND_URL=${DOMAIN_URL}
      - MINIO_PUBLIC_ENDPOINT=${DOMAIN_URL}/minio
    depends_on: []
    networks:
      - postgres-net
      - default

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    mem_limit: 30m
    memswap_limit: 60m
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - default

volumes: {}

networks:
  postgres-net:
    external: true
    name: postgres-net
  default:
    driver: bridge
